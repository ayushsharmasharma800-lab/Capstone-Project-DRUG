<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUG | Registration</title>
    <link rel="stylesheet" href="Regstnw.css">
</head>
<body>
    <div class="logo">
        <img src="Project Design/download.png" alt="">
    </div>
    <div class="reg_box">
        <div class="val">
        <div class="Name_1">
            <p>First Name:</p>
            <input type="text" name="First Name" id="" placeholder="First Name">
        </div>
        <div class="Name_2">
            <p>Last Name:</p>
            <input type="text" name="Last Name" id="" placeholder="Last Name">
      
        </div>
        <div class="Address">
            <p>Town/Village/Mohalla:</p>
            <input type="text" name="Address" id="" placeholder="Permanent Address">
        </div>
        <div class="dist">
            <p>District:</p>
            <input type="text" name="District" id="" placeholder="District">
        </div>
        <div class="state">
            <p>State/UT:</p>
            <input type="text" name="State" id="" placeholder="State/UT">
        </div>
        <div class="pin">
            <p>PIN Code:</p>
            <input type="text" name="PIN Code" id="" placeholder="PIN Code">
        </div>
        <div class="email">
            <p>Email:</p>
            <input type="email" name="Email" id="" placeholder="Email">
        </div>
        <div class="mobile">
            <p>Mobile Number:</p>
            <input type="text" name="Mobile Number" id="" placeholder="Mobile Number">
        </div>
        </div>
        <div class="center">
            <a href="fix_log.html">Already Have an   account?</a>
    
            <input type="submit" name ="Register" value="Register">
        </div>
    </div>
</body>
</html>
